name: Release Desktop

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Package KillNode (electron-builder)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # SQLite path required by prisma generate (desktop uses file-based DB)
          DATABASE_URL: "file:./data/desktop.db"
        run: npm run package --workspace=desktop
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
